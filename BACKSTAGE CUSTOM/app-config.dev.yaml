app:
  baseUrl: http://localhost:7007

backend:
  baseUrl: http://localhost:7007

  # Retirado localhost do lister para docker
  listen: ':7007'

  # Banco de dados em memória - SQLITE
  database:
    client: better-sqlite3
    connection: ':memory:'

# TechDocs
techdocs:
  builder: 'local'
  generator:
    runIn: 'local'
  publisher:
    type: 'local'

# Sem autenticação
auth:
  providers:
    guest: {}

catalog:
  locations:
    - type: file
      target: ./examples/entities.yaml

    - type: file
      target: ./examples/template/template.yaml
      rules:
        - allow: [Template]

    - type: file
      target: ./examples/org.yaml
      rules:
        - allow: [User, Group]